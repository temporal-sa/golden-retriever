# Effective Databricks Apps process manifest. Resource-backed values resolve against
# apps/retrieval_demo/databricks.yml; environment-specific held-file and tooling URLs
# are attached by the bundle config rather than committed here.
command:
  - python
  - -m
  - apps.retrieval_demo.app

env:
  - name: LAKEBASE_ENDPOINT
    valueFrom: postgres
  - name: TEMPORAL_ADDRESS
    valueFrom: temporal-address
  - name: TEMPORAL_NAMESPACE
    valueFrom: temporal-namespace
  - name: TEMPORAL_API_KEY
    valueFrom: temporal-api-key
  - name: TEMPORAL_TLS
    value: "true"
  - name: TEMPORAL_RETRIEVAL_TASK_QUEUE
    value: retrieval-v2
  - name: TEMPORAL_PROVIDER_TASK_QUEUE
    value: retrieval-provider-v2
  - name: DATABRICKS_EMBEDDING_ENDPOINT
    valueFrom: embedding-endpoint
  - name: RETRIEVAL_DEMO_MODE
    value: "true"
  - name: RETRIEVAL_SEARCH_BACKEND
    value: lakebase_hybrid
  - name: RETRIEVAL_EMBEDDING_DIMENSION
    value: "1024"
  - name: RETRIEVAL_STAGING_BACKEND
    value: lakebase
  - name: RETRIEVAL_DEMO_PROVIDER
    value: google-drive
  - name: RETRIEVAL_DEMO_DISPLAY_NAME
    value: Drive retrieval demo
  - name: LAKEBASE_POOL_MIN_SIZE
    value: "1"
  - name: LAKEBASE_POOL_MAX_SIZE
    value: "10"
